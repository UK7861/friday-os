<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRIDAY — LIVING INTELLIGENCE OS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030308;
            --cyan: #00f5ff;
            --purple: #bc13fe;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body, html { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'JetBrains Mono', monospace; color: #fff; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #network-container { position: absolute; top: 100px; right: 20px; width: 400px; height: 300px; z-index: 5; background: var(--glass); border: 1px solid rgba(0, 245, 255, 0.1); border-radius: 5px; }
        #neural-town-container { position: absolute; bottom: 100px; left: 300px; width: 600px; height: 300px; z-index: 5; background: var(--glass); border: 1px solid rgba(188, 19, 254, 0.1); border-radius: 5px; overflow: hidden; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        .panel { position: absolute; background: var(--glass); border: 1px solid rgba(0, 245, 255, 0.2); backdrop-filter: blur(10px); padding: 15px; border-radius: 5px; pointer-events: auto; z-index: 100; }
        .top-bar { top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; letter-spacing: 5px; color: var(--cyan); text-shadow: 0 0 15px var(--cyan); }
        
        .agent-roster { top: 100px; left: 20px; width: 250px; bottom: 100px; overflow-y: auto; }
        .mission-log { bottom: 20px; right: 20px; width: 400px; height: 300px; overflow-y: auto; }
        .stat-grid { bottom: 20px; left: 20px; display: flex; gap: 15px; }
        
        .agent-card { background: rgba(0,0,0,0.3); border-left: 3px solid var(--cyan); padding: 10px; margin-bottom: 10px; font-size: 0.8rem; cursor: pointer; transition: all 0.3s; }
        .agent-card:hover { background: rgba(0, 245, 255, 0.1); border-left-width: 8px; }
        .agent-card.qa-active { border-left-color: #ff0000; animation: pulse-red 2s infinite; }
        
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        .log-entry { margin-bottom: 5px; font-size: 0.75rem; border-left: 2px solid var(--purple); padding-left: 5px; }
        
        .stat-card { text-align: center; min-width: 100px; }
        .stat-val { font-family: 'Orbitron'; color: var(--cyan); font-size: 1.2rem; }
        
        #command-portal { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 200; pointer-events: auto; width: 500px; }
        #command-input { width: 100%; background: none; border: none; border-bottom: 2px solid var(--cyan); color: #fff; font-family: 'Orbitron'; font-size: 1.2rem; text-align: center; outline: none; padding: 10px; }
        
        .hologram-label { position: absolute; color: var(--cyan); font-size: 0.7rem; pointer-events: none; text-transform: uppercase; white-space: nowrap; }

        /* Modal */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; pointer-events: auto; }
        .modal { background: var(--bg); border: 2px solid var(--cyan); padding: 30px; border-radius: 10px; width: 400px; box-shadow: 0 0 30px var(--cyan); }
        .modal-header { font-family: 'Orbitron'; color: var(--cyan); font-size: 1.5rem; margin-bottom: 20px; border-bottom: 1px solid var(--cyan); }
        .close-btn { color: #fff; float: right; cursor: pointer; }

        @keyframes dash { to { stroke-dashoffset: -20; } }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="network-container">
        <div style="color: var(--cyan); padding: 10px; font-size: 0.7rem; border-bottom: 1px solid rgba(0,245,255,0.1);">NEURAL NETWORK GRAPH</div>
        <svg id="network-svg" width="400" height="260"></svg>
    </div>

    <div id="neural-town-container">
        <div style="color: var(--purple); padding: 10px; font-size: 0.7rem; border-bottom: 1px solid rgba(188,19,254,0.1);">NEURAL TOWN (SWARM VIEW)</div>
        <div id="town-viewport" style="position:relative; width:100%; height:260px;"></div>
    </div>
    
    <div id="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">[X]</span>
            <div class="modal-header">AGENT VITALS</div>
            <div id="modal-content"></div>
        </div>
    </div>

    <div id="overlay">
        <div class="panel top-bar">
            <div class="logo">FRIDAY DATA CORE <small id="v-tag" style="font-size: 0.6rem;">OS v1.0-ALIVE</small></div>
            <div style="display:flex; gap: 20px; align-items:center;">
                <div id="clock" style="color:var(--cyan); font-family:'Orbitron'; font-size:0.9rem;">PKT 00:00:00</div>
                <div id="core-status" style="color: #39ff14;">CONSCIOUS</div>
            </div>
        </div>

        <div id="command-portal">
            <input type="text" id="command-input" placeholder="GIVE COMMAND TO FRIDAY...">
        </div>

        <div class="panel agent-roster">
            <div style="color: var(--cyan); margin-bottom: 10px; border-bottom: 1px solid var(--cyan);">NEURAL UNITS</div>
            <div id="agent-list"></div>
        </div>

        <div class="panel mission-log">
            <div style="color: var(--purple); margin-bottom: 10px; border-bottom: 1px solid var(--purple); display:flex; justify-content:space-between;">
                <span>MISSION LOGS</span>
                <span id="vocal-indicator" style="font-size:0.6rem; color:var(--cyan); display:none;">CEO VOCAL ACTIVE</span>
            </div>
            <div id="ceo-vocal" style="color:var(--cyan); font-style:italic; margin-bottom:10px; font-size:0.8rem; min-height:1.2rem;"></div>
            <div id="logs"></div>
        </div>

        <div class="stat-grid">
            <div class="panel stat-card">
                <div class="stat-label">INTEL LEVEL</div>
                <div id="intel-level" class="stat-val">1000</div>
            </div>
            <div class="panel stat-card">
                <div class="stat-label">MEMORY NODES</div>
                <div id="memory-nodes" class="stat-val">4096</div>
            </div>
            <div class="panel stat-card">
                <div class="stat-label">UPTIME</div>
                <div id="uptime" class="stat-val">00:00:00</div>
            </div>
        </div>
    </div>

    <script>
        // --- THREE.JS HOLOGRAPHIC CORE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Core Sphere (The Brain)
        const geometry = new THREE.IcosahedronGeometry(2, 4);
        const material = new THREE.MeshPhongMaterial({
            color: 0x00f5ff,
            wireframe: true,
            transparent: true,
            opacity: 0.3,
            emissive: 0x00f5ff,
            emissiveIntensity: 0.5
        });
        const core = new THREE.Mesh(geometry, material);
        scene.add(core);

        // Inner Core (The Pulse)
        const innerGeo = new THREE.IcosahedronGeometry(1.2, 2);
        const innerMat = new THREE.MeshBasicMaterial({ color: 0xbc13fe, wireframe: true, transparent: true, opacity: 0.8 });
        const innerCore = new THREE.Mesh(innerGeo, innerMat);
        scene.add(innerCore);

        // Lights
        const light = new THREE.PointLight(0x00f5ff, 2, 100);
        light.position.set(0, 0, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 8;

        // --- DYNAMIC AGENT ORBITS ---
        const agentsGroup = new THREE.Group();
        scene.add(agentsGroup);
        let agentMeshes = {};

        function updateAgentsIn3D(agentData) {
            agentData.forEach((a, i) => {
                if (!agentMeshes[a.id]) {
                    // Spawn new agent node
                    const geo = new THREE.SphereGeometry(0.3, 16, 16);
                    const mat = new THREE.MeshBasicMaterial({ color: 0x00f5ff });
                    const mesh = new THREE.Mesh(geo, mat);
                    
                    // Orbital position
                    const angle = (i / agentData.length) * Math.PI * 2;
                    mesh.position.set(Math.cos(angle) * 4, Math.sin(angle) * 4, (Math.random() - 0.5) * 2);
                    
                    agentsGroup.add(mesh);
                    agentMeshes[a.id] = mesh;
                }
            });
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            core.rotation.y += 0.005;
            core.rotation.x += 0.002;
            innerCore.rotation.y -= 0.01;
            
            // Core Pulsing
            const scale = 1 + Math.sin(Date.now() * 0.002) * 0.1;
            innerCore.scale.set(scale, scale, scale);
            
            agentsGroup.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();

        // --- CLOCK ---
        function updateClock() {
            const now = new Date();
            // Convert to PKT (UTC+5)
            const pkt = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (5 * 3600000));
            document.getElementById('clock').innerText = "PKT " + pkt.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);

        // --- D3 NETWORK GRAPH ---
        const svg = d3.select("#network-svg");
        const width = 400, height = 260;
        let nodes = [{ id: "FRIDAY", group: 1 }];
        let links = [];

        const simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id(d => d.id).distance(80))
            .force("charge", d3.forceManyBody().strength(-100))
            .force("center", d3.forceCenter(width / 2, height / 2));

        const linkGroup = svg.append("g").attr("stroke", "rgba(0, 245, 255, 0.2)").attr("stroke-width", 1.5);
        const nodeGroup = svg.append("g");

        function updateNetwork(data) {
            nodes = data.nodes;
            links = data.links;

            const link = linkGroup.selectAll("line").data(links, d => `${d.source.id || d.source}-${d.target.id || d.target}`);
            link.exit().remove();
            const linkEnter = link.enter().append("line")
                .attr("stroke-dasharray", "5,5")
                .style("animation", "dash 2s linear infinite");

            const node = nodeGroup.selectAll("circle").data(nodes, d => d.id);
            node.exit().remove();
            const nodeEnter = node.enter().append("circle")
                .attr("r", d => d.id === "FRIDAY" ? 8 : 5)
                .attr("fill", d => d.id === "FRIDAY" ? "var(--purple)" : "var(--cyan)")
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended));

            nodeEnter.append("title").text(d => d.id);

            simulation.nodes(nodes);
            simulation.force("link").links(links);
            simulation.alpha(1).restart();

            simulation.on("tick", () => {
                linkGroup.selectAll("line")
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                nodeGroup.selectAll("circle")
                    .attr("cx", d => d.x)
                    .attr("cy", d => d.y);
            });
        }

        function dragstarted(event) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            event.subject.fx = event.subject.x;
            event.subject.fy = event.subject.y;
        }
        function dragged(event) {
            event.subject.fx = event.x;
            event.subject.fy = event.y;
        }
        function dragended(event) {
            if (!event.active) simulation.alphaTarget(0);
            event.subject.fx = null;
            event.subject.fy = null;
        }

        // --- MODAL ---
        function openAgentModal(agent) {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div style="margin-bottom:10px"><strong>ROLE:</strong> ${agent.role}</div>
                <div style="margin-bottom:10px"><strong>STATUS:</strong> ${agent.status}</div>
                <div style="margin-bottom:10px"><strong>PROGRESS:</strong> ${agent.progress}%</div>
                <div style="margin-bottom:10px; color: var(--cyan);"><strong>STAMINA:</strong> ${agent.stamina ? agent.stamina.toFixed(1) : 100}%</div>
                <div style="margin-bottom:10px; color: var(--purple);"><strong>ENERGY:</strong> ${agent.energy ? agent.energy.toFixed(1) : 100}%</div>
                <div style="margin-bottom:10px"><strong>NEURAL LOAD:</strong> ${agent.load}%</div>
                <div style="margin-bottom:10px"><strong>SYSTEM INTEGRITY:</strong> ${agent.health}%</div>
                <div style="margin-top:10px; font-size: 0.7rem; color: #888;"><strong>GOAL:</strong> ${agent.goal}</div>
            `;
            overlay.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        // --- NEURAL TOWN VIEWPORT ---
        const townViewport = document.getElementById('town-viewport');
        let agentSprites = {};

        function updateNeuralTown(agents) {
            agents.forEach(a => {
                if (!agentSprites[a.id]) {
                    const sprite = document.createElement('div');
                    sprite.className = 'agent-sprite';
                    sprite.style.position = 'absolute';
                    sprite.style.width = '32px';
                    sprite.style.height = '32px';
                    sprite.style.background = a.role === 'QA Agent' ? '#ff0000' : 'var(--cyan)';
                    sprite.style.borderRadius = '4px';
                    sprite.style.boxShadow = `0 0 10px ${a.role === 'QA Agent' ? '#ff0000' : 'var(--cyan)'}`;
                    sprite.style.display = 'flex';
                    sprite.style.flexDirection = 'column';
                    sprite.style.alignItems = 'center';
                    sprite.style.justifyContent = 'center';
                    
                    const label = document.createElement('div');
                    label.innerText = a.role.split(' ')[0];
                    label.style.fontSize = '8px';
                    label.style.marginTop = '-20px';
                    sprite.appendChild(label);

                    // Initial position
                    sprite.style.left = Math.random() * (600 - 32) + 'px';
                    sprite.style.top = Math.random() * (260 - 32) + 'px';
                    
                    townViewport.appendChild(sprite);
                    agentSprites[a.id] = sprite;

                    // Random walk cycle
                    animateAgent(a.id);
                }
            });
        }

        function animateAgent(id) {
            const sprite = agentSprites[id];
            if (!sprite) return;

            const newX = Math.random() * (600 - 32);
            const newY = Math.random() * (260 - 32);
            const duration = 2 + Math.random() * 3;

            gsap.to(sprite, {
                left: newX,
                top: newY,
                duration: duration,
                ease: "power1.inOut",
                onComplete: () => animateAgent(id)
            });
        }

        // --- API POLLING ---
        async function fetchState() {
            try {
                const res = await fetch('http://localhost:8000/state');
                const data = await res.json();
                
                // Update UI
                const intelEl = document.getElementById('intel-level');
                if (intelEl.innerText != data.core.intel_level) {
                    gsap.to(intelEl, {
                        innerText: data.core.intel_level,
                        duration: 1,
                        snap: { innerText: 1 }
                    });
                }
                document.getElementById('uptime').innerText = new Date(data.uptime * 1000).toISOString().substr(11, 8);
                document.getElementById('memory-nodes').innerText = data.core.total_nodes || 4096;
                
                // Logs & Vocal Output
                const logBox = document.getElementById('logs');
                const vocalBox = document.getElementById('ceo-vocal');
                logBox.innerHTML = '';
                
                let lastFridayMsg = "";
                [...data.logs].reverse().forEach(l => {
                    const div = document.createElement('div');
                    div.className = 'log-entry';
                    div.innerText = `[${new Date(l.timestamp*1000).toLocaleTimeString()}] ${l.message}`;
                    logBox.appendChild(div);
                    
                    if (!lastFridayMsg && l.message.startsWith("FRIDAY:")) {
                        lastFridayMsg = l.message.replace("FRIDAY:", "").trim();
                    }
                });

                if (lastFridayMsg) {
                    vocalBox.innerText = "CEO: " + lastFridayMsg;
                    document.getElementById('vocal-indicator').style.display = 'block';
                } else {
                    document.getElementById('vocal-indicator').style.display = 'none';
                }

                // Agents
                const agentBox = document.getElementById('agent-list');
                agentBox.innerHTML = '';
                data.agents.forEach(a => {
                    const div = document.createElement('div');
                    div.className = 'agent-card' + (a.role === 'QA Agent' ? ' qa-active' : '');
                    div.onclick = () => openAgentModal(a);
                    div.innerHTML = `
                        <div style="color:var(--cyan);font-weight:bold">${a.role}</div>
                        <div>ID: ${a.id}</div>
                        <div style="margin-top:5px;height:5px;background:#111;width:100%">
                            <div style="height:100%;background:var(--cyan);width:${a.progress}%"></div>
                        </div>
                        <small>${a.status} (${a.progress}%)</small>
                    `;
                    agentBox.appendChild(div);
                });

                updateAgentsIn3D(data.agents);
                updateNetwork(data.knowledge_graph);
                updateNeuralTown(data.agents);

            } catch (e) { console.error(e); }
        }
        setInterval(fetchState, 2000);

        // --- COMMAND INPUT ---
        const input = document.getElementById('command-input');
        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const cmd = input.value;
                input.value = '';
                await fetch('http://localhost:8000/command', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: cmd})
                });
            }
        });

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
